        '401':  { $ref: '#/components/responses/Unauthorized' }
        '403':  { $ref: '#/components/responses/Forbidden' }
        '404':  { $ref: '#/components/responses/NotFound' }

    put:
      tags: [Prescriptions]
      summary: Update prescription  (admin / doctor)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PrescriptionBody' }
      responses:
        '200':  { description: Prescription updated, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }
        '401':  { $ref: '#/components/responses/Unauthorized' }
        '403':  { $ref: '#/components/responses/Forbidden' }
        '404':  { $ref: '#/components/responses/NotFound' }

  # ════════════════════════════════════════════════════════════════════════════
  # MEDICINES
  # ════════════════════════════════════════════════════════════════════════════

  /medicines:
    get:
      tags: [Medicines]
      summary: List medicines
      parameters:
        - { name: category, in: query, schema: { type: string, enum: [antibiotic, analgesic, antiviral, antifungal, antihypertensive, antidiabetic, vitamin, supplement, other] } }
        - { name: search, in: query, schema: { type: string }, description: "Search by name (partial match)" }
        - { name: lowStock, in: query, schema: { type: boolean }, description: "Filter items with stock ≤ 10" }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, default: 10 } }
      responses:
        '200':
          description: Paginated medicines
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Success' }
        '401': { $ref: '#/components/responses/Unauthorized' }

    post:
      tags: [Medicines]
      summary: Add medicine to inventory  (admin / staff)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MedicineBody' }
            example:
              name: Amoxicillin
              genericName: "Amoxicillin Trihydrate"
              category: antibiotic
              manufacturer: Cipla
              price: 85
              stock: 500
              expiryDate: "2027-12-31"
              requiresPrescription: true
      responses:
        '201':
          description: Medicine added
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Success' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /medicines/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }

    get:
      tags: [Medicines]
      summary: Get medicine by ID
      responses:
        '200':  { description: Medicine details, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }
        '401':  { $ref: '#/components/responses/Unauthorized' }
        '404':  { $ref: '#/components/responses/NotFound' }

