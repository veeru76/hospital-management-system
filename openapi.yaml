      summary: Update medicine details  (admin / staff)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MedicineBody' }
      responses:
        '200':  { description: Medicine updated, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }
        '401':  { $ref: '#/components/responses/Unauthorized' }
        '403':  { $ref: '#/components/responses/Forbidden' }
        '404':  { $ref: '#/components/responses/NotFound' }

    delete:
      tags: [Medicines]
      summary: Delete medicine from inventory  (admin)
      responses:
        '200':  { description: Deleted }
        '401':  { $ref: '#/components/responses/Unauthorized' }
        '403':  { $ref: '#/components/responses/Forbidden' }
        '404':  { $ref: '#/components/responses/NotFound' }

  /medicines/{id}/stock:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }

    patch:
      tags: [Medicines]
      summary: Add or subtract stock  (admin / staff)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StockBody' }
            example:
              quantity: 200
              operation: add
      responses:
        '200':
          description: Stock updated — returns new stock count
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      stock: { type: integer }
        '400':
          description: Insufficient stock (for subtract)
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  # ════════════════════════════════════════════════════════════════════════════
  # ROOMS
  # ════════════════════════════════════════════════════════════════════════════

  /rooms:
    get:
      tags: [Rooms]
      summary: List rooms  (admin / doctor / staff)
      parameters:
        - { name: type, in: query, schema: { type: string, enum: [general, private, icu, emergency, operation_theatre, laboratory] } }
        - { name: status, in: query, schema: { type: string, enum: [available, occupied, maintenance, reserved] } }
        - { name: departmentId, in: query, schema: { type: string } }
        - { name: floor, in: query, schema: { type: integer } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, default: 10 } }
      responses:
        '200':
          description: Paginated rooms
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Success' }
        '401': { $ref: '#/components/responses/Unauthorized' }
